name: Build Release Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version"
        required: true
        default: "0.1.0"
      publish_release:
        description: "Create or update a GitHub Release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-2025
            artifact: github-stars-radar-windows-${{ inputs.version }}
          - platform: macos
            runner: macos-14
            artifact: github-stars-radar-macos-${{ inputs.version }}
          - platform: linux
            runner: ubuntu-24.04
            artifact: github-stars-radar-linux-${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        shell: pwsh
        run: |
          python -m unittest discover -s tests -v
          python scripts/smoke_mcp.py
          python scripts/check_manifests.py

      - name: Install Inno Setup
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows package
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: .\scripts\build_windows.ps1 -Version "${{ inputs.version }}"

      - name: Build portable package
        if: ${{ matrix.platform != 'windows' }}
        shell: bash
        run: python scripts/build_portable.py --version "${{ inputs.version }}" --platform "${{ matrix.platform }}"

      - name: Upload Windows artifacts
        if: ${{ matrix.platform == 'windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/GitHubStarsRadar-${{ inputs.version }}-windows-x64.zip
            dist/GitHubStarsRadarSetup-${{ inputs.version }}.exe
            dist/SHA256SUMS.txt

      - name: Upload portable artifacts
        if: ${{ matrix.platform != 'windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/GitHubStarsRadar-${{ inputs.version }}-${{ matrix.platform }}-x64.tar.gz
            dist/SHA256SUMS-${{ matrix.platform }}.txt

  publish-release:
    name: Publish GitHub Release
    if: ${{ inputs.publish_release == 'true' }}
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout release config
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            if ! gh release create "$tag" \
              --target "${{ github.sha }}" \
              --title "GitHub Stars Radar $tag" \
              --generate-notes; then
              python scripts/generate_release_notes.py --version "${{ inputs.version }}" --target-ref "${{ github.sha }}" --output release-notes.md
              gh release create "$tag" \
                --target "${{ github.sha }}" \
                --title "GitHub Stars Radar $tag" \
                --notes-file release-notes.md
            fi
          else
            echo "Release $tag already exists; preserving existing release notes."
          fi
          mapfile -d '' assets < <(find release-assets -type f -print0)
          gh release upload "$tag" "${assets[@]}" --clobber
