name: Build Windows Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version"
        required: true
        default: "0.1.0"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        shell: pwsh
        run: |
          py -m unittest discover -s tests -v
          py scripts\smoke_mcp.py
          py scripts\check_manifests.py

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows package
        shell: pwsh
        run: .\scripts\build_windows.ps1 -Version "${{ inputs.version }}"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: github-stars-radar-windows-${{ inputs.version }}
          path: |
            dist/GitHubStarsRadar-${{ inputs.version }}-windows-x64.zip
            dist/GitHubStarsRadarSetup-${{ inputs.version }}.exe
            dist/SHA256SUMS.txt
