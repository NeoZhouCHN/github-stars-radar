name: Build Windows Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version"
        required: true
        default: "0.1.0"
      publish_release:
        description: "Create or update a GitHub Release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-windows:
    runs-on: windows-2025
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        shell: pwsh
        run: |
          py -m unittest discover -s tests -v
          py scripts\smoke_mcp.py
          py scripts\check_manifests.py

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows package
        shell: pwsh
        run: .\scripts\build_windows.ps1 -Version "${{ inputs.version }}"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: github-stars-radar-windows-${{ inputs.version }}
          path: |
            dist/GitHubStarsRadar-${{ inputs.version }}-windows-x64.zip
            dist/GitHubStarsRadarSetup-${{ inputs.version }}.exe
            dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        if: ${{ inputs.publish_release == 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v${{ inputs.version }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --target "${{ github.sha }}" `
              --title "GitHub Stars Radar $tag" `
              --generate-notes
          }
          gh release upload $tag `
            "dist/GitHubStarsRadar-${{ inputs.version }}-windows-x64.zip" `
            "dist/GitHubStarsRadarSetup-${{ inputs.version }}.exe" `
            "dist/SHA256SUMS.txt" `
            --clobber
